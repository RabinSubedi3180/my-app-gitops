apiVersion: apps/v1
kind: Deployment
metadata:
 name: app-deployment
spec:
 replicas: 2
 selector:
  matchLabels:
    app: web-app
 template:
  metadata:
   labels:
    app: web-app
  spec:
    containers:
    - name: web-container
      image: 556438350842.dkr.ecr.eu-north-1.amazonaws.com/gitops-repo:d99df0547b301881a86bae794799522755862eb9
      ports:
        - containerPort: 5000
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "200m"
